<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ドラえもんクイズ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🔵 ドラえもんクイズ</h1>
      <p class="subtitle">ドラえもんの知識を試してみよう！</p>
    </header>

    <main id="quiz-area">
      <div id="start-screen" class="screen active">
        <p class="intro-text">全5問の4択クイズです。<br>さっそく挑戦してみよう！</p>
        <button id="start-btn" class="btn-primary">スタート</button>
      </div>

      <div id="question-screen" class="screen">
        <div class="progress-bar-wrap">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <p id="progress-text" class="progress-text"></p>
        <div class="question-card">
          <p id="question-text" class="question-text"></p>
        </div>
        <div id="choices" class="choices"></div>
        <div id="feedback" class="feedback hidden"></div>
        <button id="next-btn" class="btn-primary hidden">次の問題へ</button>
      </div>

      <div id="result-screen" class="screen">
        <div class="result-card">
          <p class="result-label">クイズ終了！</p>
          <p id="score-text" class="score-text"></p>
          <p id="score-comment" class="score-comment"></p>
        </div>
        <button id="retry-btn" class="btn-primary">もう一度挑戦する</button>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
